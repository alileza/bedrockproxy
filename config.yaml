server:
  port: 8080
  base_url: "http://localhost:5173"

aws:
  region: "eu-central-1"

s3:
  bucket: ""  # leave empty to disable S3 flushing
  prefix: "bedrockproxy"
  flush_interval: "5m"

# Models are auto-discovered from AWS Bedrock and Pricing APIs.
# To override pricing or add models manually, uncomment below:
# models:
#   - id: "anthropic.claude-sonnet-4-6"
#     name: "Claude Sonnet 4.6"
#     input_price_per_million: 3.0
#     output_price_per_million: 15.0
#     enabled: true

# Quotas: default limits per caller. Can be overridden at runtime via API
# (persisted to .bedrockproxy-quotas.json).
quotas:
  - id: "staging-admin"
    match: "account:590211171383"
    cost_per_day: 10.0
    tokens_per_day: 1000000
    requests_per_minute: 60
    mode: "warn"
    enabled: true
