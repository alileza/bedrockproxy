<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer hexagon ring — represents the bedrock/foundation -->
  <path d="M32 4L56 18V46L32 60L8 46V18L32 4Z" stroke="#0057FF" stroke-width="2.5" fill="none"/>
  <!-- Inner diamond — the proxy gateway -->
  <path d="M32 16L46 32L32 48L18 32L32 16Z" fill="#0057FF"/>
  <!-- Arrow/flow lines passing through — data in transit -->
  <line x1="32" y1="4" x2="32" y2="16" stroke="#0057FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="60" stroke="#0057FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Side flow indicators -->
  <line x1="8" y1="32" x2="18" y2="32" stroke="#0057FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="56" y2="32" stroke="#0057FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot — the proxy core -->
  <circle cx="32" cy="32" r="4" fill="white"/>
</svg>
